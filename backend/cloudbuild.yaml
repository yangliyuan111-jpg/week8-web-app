steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend Image'
    args: [
      'build',
      '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api-image:latest',
      './backend'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Image'
    args: [
      'push',
      'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api-image:latest'
    ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'api-service',
      '--image', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api-image:latest',
      '--region', 'asia-northeast1',
      '--network', '${_VPC}',
      '--subnet', '${_SUBNET}',
      '--allow-unauthenticated',
      '--ingress', 'internal-and-cloud-load-balancing',
      '--service-account', '${_SERVICE_ACCOUNT}',
      '--add-cloudsql-instances', '${_HOST_NAME}',
      '--set-env-vars', 'HOST_NAME=${_HOST_NAME},DB_NAME=demo_db',
      '--set-secrets', 'DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest'
    ]

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/api-image:latest'

options:
  logging: CLOUD_LOGGING_ONLY
